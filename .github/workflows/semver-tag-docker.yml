name: 'SemVer Tag and Docker Build'

on:
  pull_request:
    types: [ closed ]

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  build:
    name: 'Semver Tag and Build'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Calculate SemVer value
        id: calculate
        uses: UKHomeOffice/sas-github-workflows/.github/actions/calculate-semver-value@v1
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_to_highest: ${{ github.base_ref == 'main' }}

      - name: Login to repository
        if: |
          github.event.pull_request.merged == true &&
          contains(github.event.pull_request.labels.*.name, 'skip-release') == false
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.DOCKER_USER_NAME || secrets.QUAY_ROBOT_USER_NAME }}
          password: ${{ secrets.DOCKER_PASSWORD || secrets.QUAY_ROBOT_TOKEN }}

      - name: Set up QEMU
        if: |
          github.event.pull_request.merged == true &&
          contains(github.event.pull_request.labels.*.name, 'skip-release') == false
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        if: |
          github.event.pull_request.merged == true &&
          contains(github.event.pull_request.labels.*.name, 'skip-release') == false
        uses: docker/setup-buildx-action@v3

      - name: Calculate metadata
        if: |
          github.event.pull_request.merged == true &&
          contains(github.event.pull_request.labels.*.name, 'skip-release') == false
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: quay.io/ukhomeofficedigital/hocs-helm-kubectl
          tags: |
            type=raw,value=${{ steps.calculate.outputs.version }}
            type=raw,value=latest,enable=${{ github.base_ref == 'main' }}

      - name: Push container
        if: |
          github.event.pull_request.merged == true &&
          contains(github.event.pull_request.labels.*.name, 'skip-release') == false
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=hocs-helm-kubectl-buildx
          cache-to: type=gha,mode=max,scope=hocs-helm-kubectl-buildx,ignore-error=true

      - name: Tag Repository
        uses: UKHomeOffice/semver-tag-action@v3
        with:
          tag: ${{ steps.calculate.outputs.version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
